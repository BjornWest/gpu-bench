#!/usr/bin/env bash
# Sweep parameters shared by all models.
# Model-specific config (HF ID, TP, dtype, flags, vLLM version) lives in
# models/<name>/serve.sh and models/<name>/setup.sh

# Concurrency levels swept without server restart.
# The server is started with --max-num-seqs 512; batch size is controlled
# entirely by asyncio.Semaphore(batch_size) on the client side.
BATCH_SIZES=(1 2 4 8 16 32 64 128)

# Token lengths per request
INPUT_LEN=512    # prompt tokens
OUTPUT_LEN=512   # generation tokens (max_tokens)

# Requests per batch-size point (more = stabler; fewer = faster)
NUM_PROMPTS=200
NUM_WARMUP=20

PORT=8000
HOST="localhost"

# Models to run in run_all.sh
ALL_MODELS=(qwen35 deepseek-v32 glm5 minimax-m25 nemotron3 devstral2)
