#!/usr/bin/env bash
# Sweep parameters shared by all models.
# Model-specific config (HF ID, TP, dtype, flags, vLLM version) lives in
# models/<name>/serve.sh and models/<name>/setup.sh

# ── Decode test ─────────────────────────────────────────────
# Isolates decode throughput by using a shared prompt prefix across all
# requests (prefix caching makes prefill essentially free after the first
# request). Sweeps batch sizes to find the decode-bandwidth curve.
DECODE_BATCH_SIZES=(16 64 128 256 512)
DECODE_INPUT_LEN=100    # short input — cached after first request
DECODE_OUTPUT_LEN=100  # long output — this is what we're measuring

# ── Prefill test ────────────────────────────────────────────
# Isolates prefill throughput by using long input and very short output.
# Each request has a unique prefix (no caching). Sweeps input lengths to
# see how prefill scales with context size.
PREFILL_INPUT_LENS=(1024 2048 4096 16384 32768 65536)
PREFILL_OUTPUT_LEN=1    # minimal decode — just enough to confirm completion
PREFILL_BATCH_SIZES=(1)

# ── Shared ──────────────────────────────────────────────────
# Requests per sweep point (more = stabler; fewer = faster)
NUM_PROMPTS=200
NUM_WARMUP=20

PORT=8000
HOST="localhost"

# Models to run in run_all.sh
ALL_MODELS=(qwen35 deepseek-v32 glm5 minimax-m25 nemotron3 devstral2)
